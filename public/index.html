<!DOCTYPE html>
<html>

<head>

    <title>Chat Login</title>

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #020617;
            font-family: sans-serif;
            color: white;
        }

        .container {
            background: #0f172a;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: none;
            background: #020617;
            color: white;
            border: 1px solid #1e293b;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #2563eb;
        }

        .toggle {
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            color: #60a5fa;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2 id="title">Login</h2>

        <input id="username" placeholder="Username">

        <input id="phone" placeholder="Unique Number">

        <input id="password" placeholder="Password" type="password">

        <button onclick="login()">Login</button>

        <p class="toggle" onclick="signup()">Sign Up</p>

    </div>

    <script>

        async function login() {

            const username = document.getElementById("username").value;
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;

            if (username === "" || phone === "" || password === "") {
                alert("Please enter all fields");
                return;
            }

            const res = await fetch("/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    phone,
                    password
                })
            });

            const data = await res.json();

            if (data.status === "success") {

                localStorage.setItem("username", data.username);
                localStorage.setItem("phone", data.phone);

                window.location = "chat.html";

            } else {
                alert(data.status);
            }
        }


        async function signup() {

            const username = document.getElementById("username").value;
            const phone = document.getElementById("phone").value;
            const password = document.getElementById("password").value;

            if (username === "" || phone === "" || password === "") {
                alert("Please enter all fields");
                return;
            }

            const res = await fetch("/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    username,
                    phone,
                    password
                })
            });

            const data = await res.json();

            alert(data.status);

        }

    </script>
</body>

</html>
